<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — jobSeeker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

  <div class="bg-white shadow rounded-lg p-8 w-full max-w-sm">
    <h1 class="text-xl font-semibold mb-6 text-center">jobSeeker</h1>

    {% if error %}
    <p class="mb-4 text-sm text-red-600 text-center">{{ error }}</p>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1" for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          required
          autofocus
          class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>
      <button type="submit"
        class="w-full bg-blue-600 text-white rounded px-4 py-2 text-sm font-medium hover:bg-blue-700 transition">
        Sign in
      </button>
    </form>
  </div>

</body>
</html>
