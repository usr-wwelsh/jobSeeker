{% extends "base.html" %}

{% block title %}Manual Prompt — jobSeeker{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-xl font-semibold">Manual Prompt Generator</h1>
  <p class="text-sm text-gray-500 mt-1">Paste any job description and get a personalized prompt — no scraping needed.</p>
</div>

<div class="grid grid-cols-1 gap-6 lg:grid-cols-2">

  <!-- Input form -->
  <div class="bg-white rounded-lg border border-gray-200 p-6">
    <form
      hx-post="/manual"
      hx-target="#result-section"
      hx-swap="innerHTML"
      hx-indicator="#generate-spinner"
    >
      <div class="space-y-4">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">Company <span class="font-normal">(optional)</span></label>
            <input name="company" type="text" placeholder="Acme Corp"
              class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">Title <span class="font-normal">(optional)</span></label>
            <input name="title" type="text" placeholder="Software Engineer"
              class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
        </div>

        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Job URL <span class="font-normal">(optional)</span></label>
          <input name="job_url" type="text" placeholder="https://..."
            class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Job Description <span class="text-red-500">*</span></label>
          <textarea name="description" required rows="16" placeholder="Paste the full job description here…"
            class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y font-mono"
          ></textarea>
        </div>

        <div class="flex items-center gap-3">
          <button type="submit"
            class="bg-blue-600 text-white px-4 py-2 rounded text-sm font-medium hover:bg-blue-700 transition">
            Generate Prompt
          </button>
          <span id="generate-spinner" class="htmx-indicator text-sm text-gray-500">Matching portfolio…</span>
        </div>
      </div>
    </form>
  </div>

  <!-- Result -->
  <div id="result-section">
    {% include "manual_result.html" %}
  </div>

</div>
{% endblock %}
